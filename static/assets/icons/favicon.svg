<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="4"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.6"/>
  
  <!-- Inner decorative circles -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>
  
  <!-- Neural network lines -->
  <g stroke="url(#grad1)" stroke-width="2" opacity="0.6" filter="url(#glow)">
    <line x1="256" y1="56" x2="256" y2="456"/>
    <line x1="56" y1="256" x2="456" y2="256"/>
    <line x1="106" y1="106" x2="406" y2="406"/>
    <line x1="406" y1="106" x2="106" y2="406"/>
  </g>
  
  <!-- Neural nodes -->
  <g fill="url(#grad1)" filter="url(#glow)">
    <circle cx="256" cy="56" r="12"/>
    <circle cx="256" cy="456" r="12"/>
    <circle cx="56" cy="256" r="12"/>
    <circle cx="456" cy="256" r="12"/>
    <circle cx="106" cy="106" r="10"/>
    <circle cx="406" cy="106" r="10"/>
    <circle cx="106" cy="406" r="10"/>
    <circle cx="406" cy="406" r="10"/>
  </g>
  
  <!-- Center diamond -->
  <polygon points="256,180 332,256 256,332 180,256" fill="none" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Center circle -->
  <circle cx="256" cy="256" r="50" fill="#0a0a0f" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- DRS Text -->
  <text x="256" y="268" text-anchor="middle" fill="url(#grad1)" font-family="Orbitron, Arial, sans-serif" font-size="36" font-weight="700">DRS</text>
  
  <!-- AI indicator dots -->
  <g fill="url(#grad1)" opacity="0.8">
    <circle cx="226" cy="300" r="4"/>
    <circle cx="256" cy="300" r="4"/>
    <circle cx="286" cy="300" r="4"/>
  </g>
</svg>